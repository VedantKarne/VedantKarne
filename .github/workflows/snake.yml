name: Generate Enhanced Contribution Snake

on:
  # Regenerate automatically every day.
  schedule:
    - cron: "0 0 * * *"

  # Allow manual execution from the Actions tab.
  workflow_dispatch:

  # Regenerate when this workflow is changed.
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"
      - "scripts/enhance_snake.py"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      # Step 1: Download the repository files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Generate the base snake SVG files.
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-snake.svg?color_snake=%237C3AED&color_dots=%23F5F3FF,%23DDD6FE,%23A78BFA,%237C3AED,%234C1D95
            dist/github-snake-dark.svg?color_snake=%23C4B5FD&color_dots=%2305050A,%231A1033,%234C1D95,%237C3AED,%23C4B5FD

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Prepare Python.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 4: Inject glow, pulse and shimmer effects.
      - name: Enhance snake animation
        run: |
          python scripts/enhance_snake.py dist/github-snake.svg
          python scripts/enhance_snake.py dist/github-snake-dark.svg --dark

      # Step 5: Publish the generated files.
      - name: Publish enhanced snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          build_dir: dist
          branch: output

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
