name: Generate Enhanced Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"
      - "scripts/enhance_snake.py"

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-snake.svg?color_snake=%237C3AED&color_dots=%23F5F3FF,%23DDD6FE,%23A78BFA,%237C3AED,%234C1D95
            dist/github-snake-dark.svg?color_snake=%23C4B5FD&color_dots=%2305050A,%231A1033,%234C1D95,%237C3AED,%23C4B5FD

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Enhance snake animation
        run: |
          python scripts/enhance_snake.py dist/github-snake.svg
          python scripts/enhance_snake.py dist/github-snake-dark.svg --dark

      - name: Publish enhanced snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
